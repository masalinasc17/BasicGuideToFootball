<!DOCTYPE html> <!--ReqH1-->
<html lang="en-GB"> <!--ReqH1-->
<head> <!--ReqH2-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="author" content="Alessio Salinas Castro">
    <meta name="description" content="Contact us page">
    <meta name="keywords" content="football, guide, football rules, ball">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/single-page-form.css">
    <script src="../js/myJS.js" defer></script>
</head>
<body>
    <header>
        <h1>Contact Us</h1> <!--ReqH5-->
    </header>
    <main class="responsive">
        <section id="form">
            <span>
            <h2>Contact form</h2> <!--ReqH5-->
            <form action="mailto:info@bookclub.com?subject=Contact%20Form" method="post" novalidate onsubmit="return validateForm()" onkeydown="handleKeydown(event)"> <!--ReqH16--> 
                <fieldset> <!--ReqH20-->
                    <legend>Contact information</legend>
                    <label for="name">Name:</label> <!--ReqH17-->
                    <input type="text" id="name" name="name" pattern="[A-Z][a-z]+" required oninput="updatePreview(); checkValidityState(this)" onmouseover="handleMouseOver(this)" onmouseout="handleMouseOut(this)"> <!--ReqH19-->
                    <label for="email">Email:</label> <!--ReqH17-->
                    <input type="email" id="email" name="email" required oninput="updatePreview(); checkValidityState(this)" onmouseover="handleMouseOver(this)" onmouseout="handleMouseOut(this)"> <!--ReqH19-->
                    <label for="password">Password:</label> <!--ReqH17-->
                    <input type="password" id="password" name="password" required oninput="updatePreview(); checkValidityState(this)" onmouseover="handleMouseOver(this)" onmouseout="handleMouseOut(this)"> <!--ReqH19-->
                    <label for="phone">Phone:</label> <!--ReqH17-->
                    <input type="tel" id="phone" name="phone" pattern="(\+34|0034)?[6789][0-9]{8}" required oninput="updatePreview(); checkValidityState(this)" onmouseover="handleMouseOver(this)" onmouseout="handleMouseOut(this)"> <!--ReqH19-->
                </fieldset>
                <fieldset> <!--ReqH20-->
                    <legend>What is your message for?</legend>
                    <input type="radio" id="suggestion" name="for" value="suggestion" onchange="updatePreview()"> <!--ReqH20-->
                    <label for="suggestion">Suggestion</label>
                    <input type="radio" id="correction" name="for" value="correction" onchange="updatePreview()"> <!--ReqH20-->
                    <label for="correction">Correction</label>
                </fieldset>
                <fieldset> <!--ReqH20-->
                    <legend>Why are you involved in football?</legend>
                     <!--ReqH20-->
                    <label for="profession" class="option">It is part of my job
                        <input type="checkbox" id="profession" name="profession" value="profession" onchange="updatePreview()">
                    </label>
                     <!--ReqH20-->
                    <label for="teamFan" class="option">I am a big fan of a team
                        <input type="checkbox" id="teamFan" name="teamFan" value="teamFan" onchange="updatePreview()">
                    </label>
                     <!--ReqH20-->
                    <label for="playerFan" class="option">I am a big fan of a player
                        <input type="checkbox" id="playerFan" name="playerFan" value="playerFan" onchange="updatePreview()">
                    </label>
                    <label for="category">Favorite:</label>
                    <select id="category" name="category" onchange="updatePreview()"> <!--ReqH20-->
                            <option value="none">None</option>
                        <optgroup label="Team"> <!--ReqH20-->
                            <option value="FC Barcelona">FC Barcelona</option>
                            <option value="Real Madrid">Real Madrid</option>
                        </optgroup>
                        <optgroup label="Player"> <!--ReqH20-->
                            <option value="Lionel Messi">Lionel Messi</option>
                            <option value="Cristiano Ronaldo">Cristiano Ronaldo</option>
                        </optgroup>
                    </select>
                </fieldset>
                <fieldset> <!--ReqH20-->
                    <legend>Message</legend>
                    <label for="message">Message:</label> <!--ReqH17-->
                    <textarea id="message" name="message" oninput="updatePreview()" onmouseover="handleMouseOver(this); handleMouseOut(this)"></textarea>
                </fieldset>
                <div id="error-box" class="error-box"></div>
                <button type="submit" class="btn" id="submit-btn">Send</button> <!--ReqH18-->
                <button type="reset" class="btn">Clear form </button> <!--ReqH18-->
            </form>
            </span>
            <!--Preview container-->
            <section id="preview">
                <h2>Live preview</h2>
                <div id="preview-content">
                    <p>Form preview will appear here.</p>
                </div>
            </section>
        </section>

    </main>
    <footer>
        <a href="../index.html" target="_self">
            <img src="../resources/images/logo.png" alt="Basic Guide to Football logo" title="Basic Guide to Football" width="100" height="100"> <!--ReqH10-->
        </a>
        <p>&copy; 2026 Basic Guide to Football. All rights reserved.</p>
    </footer>
</body>
</html>
